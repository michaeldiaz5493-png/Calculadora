<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcuPiola — Sin conexión</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#111318;color:#E8ECF3;
    font-family:'Space Grotesk',sans-serif;
    height:100dvh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;
  }
  .icon{font-size:64px;margin-bottom:8px}
  h1{font-size:22px;font-weight:700}
  p{font-size:14px;color:#98A2B3;line-height:1.6;max-width:280px}
  button{
    margin-top:8px;padding:12px 24px;border-radius:20px;border:none;
    background:linear-gradient(135deg,#F59E0B,#FBBF24);
    color:#000;font-family:'Space Grotesk',sans-serif;
    font-size:14px;font-weight:800;cursor:pointer;
  }
</style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Sin conexión</h1>
  <p>CalcuPiola necesita internet para cargar por primera vez. Conéctate y vuelve a intentarlo.</p>
  <button onclick="window.location.reload()">🔄 Reintentar</button>
</body>
</html>
